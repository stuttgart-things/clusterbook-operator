---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: clusterbookallocations.clusterbook.stuttgart-things.com
spec:
  group: clusterbook.stuttgart-things.com
  names:
    kind: ClusterbookAllocation
    listKind: ClusterbookAllocationList
    plural: clusterbookallocations
    shortNames:
    - cbka
    singular: clusterbookallocation
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Name
      type: string
    - jsonPath: .spec.networkKey
      name: Network
      type: string
    - jsonPath: .status.ip
      name: IP
      type: string
    - jsonPath: .status.fqdn
      name: FQDN
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              createDNS:
                description: |-
                  CreateDNS asks clusterbook to create a wildcard DNS record for the
                  reserved IP. The resulting FQDN is exposed in status and written to
                  every configured sink.
                type: boolean
              name:
                description: Name is the reservation key under which clusterbook tracks
                  this IP.
                type: string
              networkKey:
                description: NetworkKey is the clusterbook network pool (e.g. "10.31.101").
                type: string
              providerConfigRef:
                description: |-
                  ProviderConfigRef points to a ClusterbookProviderConfig with the
                  clusterbook API URL and TLS options.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              releaseOnDelete:
                description: ReleaseOnDelete releases the clusterbook IP when the
                  CR is deleted.
                type: boolean
              sinks:
                description: |-
                  Sinks controls where the reservation facts (IP, FQDN, zone) are
                  published. At least one sink must be set; both can be set together.
                properties:
                  clusterSecretLabels:
                    description: |-
                      ClusterSecretLabels points at an existing ArgoCD cluster Secret
                      and merges clusterbook-prefixed labels and annotations onto it.
                      The Secret's data is never touched and no owner reference is set —
                      same contract as ClusterbookCluster's enrich mode. Useful when the
                      consumer is the built-in ApplicationSet Cluster generator.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  configMap:
                    description: |-
                      ConfigMap creates (and owns) a ConfigMap with the reservation facts
                      as plain string keys — convenient for ApplicationSet list/plugin
                      generators, Helm value files, or any consumer that can read a
                      ConfigMap.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                type: object
            required:
            - name
            - networkKey
            - providerConfigRef
            - sinks
            type: object
            x-kubernetes-validations:
            - message: at least one sink must be set (sinks.configMap or sinks.clusterSecretLabels)
              rule: has(self.sinks) && (has(self.sinks.configMap) || has(self.sinks.clusterSecretLabels))
          status:
            properties:
              clusterSecretRef:
                description: |-
                  ClusterSecretRef echoes spec.sinks.clusterSecretLabels when that
                  sink is active.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                - namespace
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
