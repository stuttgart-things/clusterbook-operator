# Reserve a LoadBalancer IP from clusterbook and materialise it as a
# CiliumLoadBalancerIPPool so Services matching the selector get it
# assigned. Optional createDNS=true asks clusterbook/PowerDNS to add a
# wildcard DNS record — useful for an Ingress / Gateway API frontend.
---
apiVersion: clusterbook.stuttgart-things.com/v1alpha1
kind: ClusterbookProviderConfig
metadata:
  name: default
spec:
  apiURL: https://clusterbook.example.com
  insecureSkipVerify: false
---
apiVersion: clusterbook.stuttgart-things.com/v1alpha1
kind: ClusterbookLoadBalancer
metadata:
  name: ingress-main
spec:
  networkKey: "10.31.101"
  name: ingress-main          # reservation key in clusterbook
  createDNS: true             # optional wildcard DNS record
  providerConfigRef:
    name: default
  ciliumPool:
    # poolName defaults to "<spec.name>-pool" when empty
    poolName: ingress-main-pool
    serviceSelector:
      matchLabels:
        app.kubernetes.io/name: ingress-nginx
  releaseOnDelete: true
---
# Alternate target mode — patch an existing Service's loadBalancerIP
# instead of creating a Cilium pool. Use when you don't have LB IPAM, or
# when you want tight 1:1 control over which Service gets which IP.
apiVersion: clusterbook.stuttgart-things.com/v1alpha1
kind: ClusterbookLoadBalancer
metadata:
  name: ingress-main-svcref
spec:
  networkKey: "10.31.101"
  name: ingress-main-svcref
  createDNS: true
  providerConfigRef:
    name: default
  serviceRef:
    name: ingress-nginx-controller
    namespace: ingress-nginx
  releaseOnDelete: true
