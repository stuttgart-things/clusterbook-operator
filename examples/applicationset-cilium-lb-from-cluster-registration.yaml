# Cilium LoadBalancer IP pool per cluster, driven entirely by the
# ClusterbookCluster CR's own reservation — no separate
# ClusterbookAllocation. One reservation + one DNS record per cluster,
# used for both the cluster registration's logical endpoint and the
# Cilium LB pool that fronts workload Services.
#
# Pick THIS example when every cluster you register will have one
# clusterbook-managed IP that does double duty (API-server-side logical
# address AND LB pool). Pick applicationset-cilium-lb-pool.yaml (the
# ClusterbookAllocation-based flavor) when you want multiple distinct
# IPs per cluster — one for the API server, one or more for LB pools.
#
# Preconditions:
#   - Target clusters registered via ClusterbookCluster (so their
#     cluster Secrets carry the clusterbook.stuttgart-things.com/
#     allocation-ip label and /ip annotation).
#   - The `infra/cilium/lb` chart in stuttgart-things/argocd accepting
#     poolName / blocks / l2Policy.
#   - An AppProject per cluster (e.g. auto-generated by the
#     cluster-projects ApplicationSet in stuttgart-things/argocd) whose
#     destinations allowlist includes the cluster by name.
#
# What it generates: one Application per ClusterbookCluster-registered
# cluster, each deploying a CiliumLoadBalancerIPPool pinned to that
# cluster's reserved IP.
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cilium-lb-clusterbook
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchExpressions:
            # Every cluster registered via ClusterbookCluster has this
            # label (the reserved IP). Presence check = "any cluster
            # with a clusterbook reservation."
            - key: clusterbook.stuttgart-things.com/allocation-ip
              operator: Exists
  template:
    metadata:
      name: cilium-lb-{{ .name }}
    spec:
      # AppProject per cluster — the cluster-projects ApplicationSet in
      # stuttgart-things/argocd auto-provisions one named after the
      # cluster. Change to `default` if your fleet doesn't use that.
      project: '{{ .name }}'
      source:
        repoURL: https://github.com/stuttgart-things/argocd.git
        targetRevision: main
        path: infra/cilium/lb
        helm:
          valuesObject:
            poolName: '{{ .name }}-pool'
            # Single-IP reservation → degenerate range (start == stop).
            # Reads the IP ClusterbookCluster wrote as an annotation.
            blocks:
              - start: '{{ index .metadata.annotations "clusterbook.stuttgart-things.com/ip" }}'
                stop:  '{{ index .metadata.annotations "clusterbook.stuttgart-things.com/ip" }}'
            l2Policy:
              name: default-l2-announcement-policy
              namespace: kube-system
              externalIPs: true
              loadBalancerIPs: true
      destination:
        # name resolves to data.server from the matched cluster Secret.
        # Survives future data.server rewrites (e.g. flipping
        # preserveKubeconfigServer → useFQDNAsServer).
        name: '{{ .name }}'
        namespace: kube-system
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
